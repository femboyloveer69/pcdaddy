<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>PC DADDY – Delete Category</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-900">
<header class="bg-black text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 h-20">
    <div class="flex items-center gap-4">
      <a href="/"><img src="../static/images/logó.png" alt="PC DADDY logó" class="h-16 w-auto"></a>
      <div class="leading-tight">
        <h1 class="text-2xl font-extrabold text-green-500 tracking-wide">PC DADDY</h1>
        <p class="text-xs text-gray-400">Prémium PC webshop</p>
      </div>
    </div>
    <div class="flex-1 mx-6">
      <input 
        type="text"
        placeholder="Keresés alkatrészek, konfigurációk között..."
        class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
      />
    </div>
    <div class="flex items-center">
      <button class="text-3xl hover:text-green-500 transition relative" aria-label="Kosár">
        🛒
        <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{{ items_amount }}</span>
      </button>
    </div>

  </div>
</header>

<div class="max-w-xl mx-auto mt-16 mb-20 bg-white rounded-3xl shadow-2xl p-10 animate-fadeIn">

  <h1 class="text-3xl font-extrabold text-center text-red-600 mb-2">
    🗑️ Delete Category
  </h1>
  <p class="text-center text-gray-500 mb-8 text-sm">
    Select a category to delete
  </p>

  <form method="POST" action="/delete-category" class="space-y-7">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Select category to delete
      </label>
      <select
        name="category_id"
        required
        onchange="updatePreview(this)"
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               bg-white focus:outline-none focus:ring-2 focus:ring-red-500
               focus:border-red-500 transition"
      >
        <option value="">-- Choose a category --</option>
        {% for category in categories %}
          <option value="{{ category.id }}" data-name="{{ category.name }}" data-image="{{ category.image }}">
            {{ category.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mt-4 hidden bg-red-50 border-2 border-red-200 rounded-xl p-6" id="previewBox">
      <p class="text-xs text-gray-500 mb-4 font-semibold">Preview:</p>
      <div class="flex items-center gap-4 mb-4">
        <img 
          id="categoryImage"
          class="w-24 h-24 object-cover rounded-lg"
          alt="Category preview"
        >
        <div>
          <h3 class="text-lg font-bold text-gray-800" id="categoryName"></h3>
          <p class="text-red-600 font-semibold text-sm mt-2">
            ⚠️ All products in this category will also be deleted!
          </p>
        </div>
      </div>

      <div class="text-sm text-gray-600 bg-yellow-50 border border-yellow-200 rounded-lg p-3">
        <p class="font-semibold text-yellow-800 mb-1">⚡ Warning:</p>
        <p>This action cannot be undone.</p>
      </div>
    </div>

    <button
      id="deleteBtn"
      type="submit"
      disabled
      class="w-full bg-red-600 hover:bg-red-700 disabled:bg-gray-400
             text-white font-bold py-3 rounded-xl
             shadow-lg transition transform hover:scale-[1.02]
             active:scale-[0.98]"
    >
      🗑️ Delete Category
    </button>

  </form>
</div>
<script>
  function updatePreview(select) {
    const previewBox = document.getElementById("previewBox");
    const deleteBtn = document.getElementById("deleteBtn");
    
    if (!select.value) {
      previewBox.classList.add("hidden");
      deleteBtn.disabled = true;
      return;
    }
    
    const selected = select.options[select.selectedIndex];
    document.getElementById("categoryName").textContent = selected.dataset.name;
    document.getElementById("categoryImage").src = "../static/uploads/" + selected.dataset.image;
    
    previewBox.classList.remove("hidden");
    deleteBtn.disabled = false;
  }
</script>

</body>
</html>
