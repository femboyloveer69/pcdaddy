<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Termék nézet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>


<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #dcdcdc;
}

.page-title {
    text-align: center;
    padding: 20px 0 10px;
    font-size: 20px;
}

.logo {
    width: 80px;
    height: 40px;
    background: #ccc;
}

.search {
    flex: 1;
    padding: 8px;
}

.cart {
    font-size: 22px;
    cursor: pointer;
}

.product-container {
    width: 95%;
    max-width: 1200px;
    margin: 0 auto 40px auto;
    background: #eee;
    border: 1px solid #bbb;
    padding: 15px;
}

@media (max-width: 768px) {
    .product-container {
        width: 98%;
        padding: 10px;
        margin-bottom: 20px;
    }
}
.product-layout {
    display: grid;
    grid-template-columns: 1fr 3fr;
    gap: 20px;
}

@media (max-width: 768px) {
    .product-layout {
        grid-template-columns: 1fr;
        gap: 15px;
    }
}

.product-image {
    background: #ddd;
    height: 250px;
    width: 250px;
    max-width: 100%;
    border-radius: 20px;
    border: 1px solid #aaa;
    background-image: url(../static/uploads/{{product.image}});
    background-size: cover;
    background-position: center;
}

@media (max-width: 768px) {
    .product-image {
        height: 200px;
        width: 200px;
        margin: 0 auto;
    }
}
.product-description {
    margin-top: 15px;
    background: #f5f5f5;
    border: 1px solid #aaa;
    padding: 10px;
    min-height: 80px;
}

.product-info {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.product-price-box {
    background: #f5f5f5;
    border: 1px solid #aaa;
    padding: 20px;
    text-align: center;
    font-size: 24px;
}

.buy-button {
    margin-top: 20px;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #888;
    background: #ddd;
    cursor: pointer;
}

.buy-button:hover {
    background: #ccc;
}
@media (max-width: 768px) {
    .product-layout {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<header class="bg-black text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 h-20">
    <div class="flex items-center gap-4">
      <a href="/"><img src="../static/images/logó.png" alt="PC DADDY logó" class="h-16 w-auto"></a>
      <div class="leading-tight">
        <h1 class="text-2xl font-extrabold text-green-500 tracking-wide">PC DADDY</h1>
        <p class="text-xs text-gray-400">Prémium PC webshop</p>
      </div>
    </div>
    <div class="flex-1 mx-6">
      <form action="/products" method="GET" class="w-full">
        <input 
          type="text"
          name="search"
          placeholder="Keresés alkatrészek, konfigurációk között..."
          class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </form>
    </div>
    <div class="flex items-center">
      <a href="/cart"><button class="text-3xl hover:text-green-500 transition relative" aria-label="Kosár">
        🛒
        <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{{ items_amount }}</span>
      </button></a>
    </div>

  </div>
</header>

<div class="product-container">
    <div class="product-layout">
        
        <div>
            <div class="product-image"></div>
            <div class="product-description">{{ product.description }}</div>
        </div>

        <div class="product-info">
            <div class="product-price-box">
                Termék<br>Ár: {{ product.price }}<br>
                {% if product.quantity > 0 %}
                    <span class="text-green-600 font-semibold">Raktáron: {{ product.quantity }} db</span>
                {% else %}
                    <span class="text-red-600 font-semibold">Nincs raktáron</span>
                {% endif %}
            </div>
            {% if product.quantity > 0 %}
            <form method="POST" action="/add_to_cart/{{ product.id }}">
                <button type="submit" class="buy-button">Vásárlás</button>
            </form>
            {% else %}
            <button class="buy-button opacity-50 cursor-not-allowed" disabled>Nincs raktáron</button>
            {% endif %}
        </div>

    </div>
</div>

</body>
</html>
