<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>PC DADDY – Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-900">
<header class="bg-black text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-16 sm:h-20">
      <div class="flex items-center gap-2 sm:gap-4">
        <a href="/"><img src="../static/images/logó.png" alt="PC DADDY logó" class="h-12 sm:h-16 w-auto"></a>
        <div class="leading-tight">
          <h1 class="text-lg sm:text-2xl font-extrabold text-green-500 tracking-wide">PC DADDY</h1>
          <p class="text-xs text-gray-400 hidden sm:block">Prémium PC webshop</p>
        </div>
      </div>

      <div class="flex-1 mx-2 sm:mx-6 hidden md:block">
        <form action="/products" method="GET" class="w-full">
          <input
            type="text"
            name="search"
            placeholder="Keresés alkatrészek, konfigurációk között..."
            class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
          />
        </form>
      </div>

      <div class="flex items-center">
        <a href="/cart"><button class="text-2xl sm:text-3xl hover:text-green-500 transition relative" aria-label="Kosár">
          🛒
          <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{{ items_amount }}</span>
        </button></a>
      </div>
    </div>

    <div class="md:hidden pb-4">
      <form action="/products" method="GET" class="w-full">
        <input
          type="text"
          name="search"
          placeholder="Keresés..."
          class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </form>
    </div>
  </div>
</header>
<div class="max-w-2xl mx-auto mt-8 sm:mt-16 mb-12 sm:mb-20 bg-white rounded-2xl sm:rounded-3xl shadow-2xl p-6 sm:p-10 animate-fadeIn">

  <h1 class="text-2xl sm:text-3xl font-extrabold text-center text-gray-800 mb-2">
    ➕ Új termék hozzáadása
  </h1>
  <p class="text-center text-gray-500 mb-6 sm:mb-8 text-sm sm:text-base">
    Adjon hozzá egy új terméket az webshopjához
  </p>

  <form method="POST" action="/add-product" enctype="multipart/form-data" class="space-y-5 sm:space-y-7">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        Termék neve
      </label>
      <input
        type="text"
        name="name"
        required
        placeholder="például RTX 4070 Ti"
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-green-500
               focus:border-green-500 transition text-sm sm:text-base"
      />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        Leírás
      </label>
      <textarea
        name="description"
        rows="4"
        placeholder="Rövid termék leírás..."
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-green-500
               focus:border-green-500 transition resize-none text-sm sm:text-base"
      ></textarea>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        Ár (HUF)
      </label>
      <input
        type="number"
        step="0.01"
        name="price"
        required
        placeholder="például 349999"
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-green-500
               focus:border-green-500 transition text-sm sm:text-base"
      />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        Kategória
      </label>
      <select
        name="category_id"
        required
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               bg-white focus:outline-none focus:ring-2 focus:ring-green-500
               focus:border-green-500 transition text-sm sm:text-base"
      >
        {% for category in categories %}
          <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        Mennyiség raktáron
      </label>
      <input
        type="number"
        name="quantity"
        required
        min="0"
        placeholder="például 10"
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               focus:outline-none focus:ring-2 focus:ring-green-500
               focus:border-green-500 transition text-sm sm:text-base"
      />
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Termék képe
      </label>
      <input
        type="file"
        name="image"
        accept="image/*"
        required
        onchange="previewImage(event)"
        class="w-full text-sm text-gray-600
               file:mr-4 file:py-2.5 file:px-4 sm:file:px-5
               file:rounded-xl file:border-0
               file:text-sm file:font-semibold
               file:bg-green-500 file:text-white
               hover:file:bg-green-600 transition cursor-pointer"
      />

      <div class="mt-4 hidden" id="previewBox">
        <p class="text-xs text-gray-500 mb-2">Előnézet:</p>
        <img
          id="imagePreview"
          class="w-32 h-32 sm:w-48 sm:h-48 object-cover rounded-xl border shadow-md"
          alt="Preview"
        >
      </div>
    </div>
    <button
      type="submit"
      class="w-full bg-green-500 hover:bg-green-600
             text-white font-bold py-3 rounded-xl
             shadow-lg transition transform hover:scale-[1.02]
             active:scale-[0.98] text-sm sm:text-base"
    >
      ✅ Termék hozzáadása
    </button>

  </form>
</div>
<script>
  function previewImage(event) {
    const previewBox = document.getElementById("previewBox");
    const img = document.getElementById("imagePreview");
    img.src = URL.createObjectURL(event.target.files[0]);
    previewBox.classList.remove("hidden");
  }
</script>

</body>
</html>
