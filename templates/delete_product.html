<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>PC DADDY – Delete Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-900">
<header class="bg-black text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-16 sm:h-20">
      <div class="flex items-center gap-2 sm:gap-4">
        <a href="/"><img src="../static/images/logó.png" alt="PC DADDY logó" class="h-12 sm:h-16 w-auto"></a>
        <div class="leading-tight">
          <h1 class="text-lg sm:text-2xl font-extrabold text-green-500 tracking-wide">PC DADDY</h1>
          <p class="text-xs text-gray-400 hidden sm:block">Prémium PC webshop</p>
        </div>
      </div>

      <div class="flex-1 mx-2 sm:mx-6 hidden md:block">
        <form action="/products" method="GET" class="w-full">
          <input
            type="text"
            name="search"
            placeholder="Keresés alkatrészek, konfigurációk között..."
            class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
          />
        </form>
      </div>

      <div class="flex items-center">
        <a href="/cart"><button class="text-2xl sm:text-3xl hover:text-green-500 transition relative" aria-label="Kosár">
          🛒
          <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{{ items_amount }}</span>
        </button></a>
      </div>
    </div>

    <div class="md:hidden pb-4">
      <form action="/products" method="GET" class="w-full">
        <input
          type="text"
          name="search"
          placeholder="Keresés..."
          class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </form>
    </div>
  </div>
</header>
<div class="max-w-2xl mx-auto mt-8 sm:mt-16 mb-12 sm:mb-20 bg-white rounded-2xl sm:rounded-3xl shadow-2xl p-6 sm:p-10 animate-fadeIn">

  <h1 class="text-2xl sm:text-3xl font-extrabold text-center text-red-600 mb-2">
    🗑️ Termék törlése
  </h1>
  <p class="text-center text-gray-500 mb-6 sm:mb-8 text-sm sm:text-base">
    Válassz egy terméket a törléshez
  </p>

  <form method="POST" action="/delete-product" class="space-y-5 sm:space-y-7">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Törlendő termék kiválasztása
      </label>
      <select
        name="product_id"
        required
        onchange="updatePreview(this)"
        class="w-full px-4 py-3 rounded-xl border border-gray-300
               bg-white focus:outline-none focus:ring-2 focus:ring-red-500
               focus:border-red-500 transition text-sm sm:text-base"
      >
        <option value="">-- Válassz egy terméket --</option>
        {% for product in products %}
          <option value="{{ product.id }}" data-name="{{ product.name }}" data-price="{{ product.price }}" data-image="{{ product.image }}" data-description="{{ product.description }}" data-category="{{ product.category }}">
            {{ product.name }} - {{ "%.2f"|format(product.price) }} HUF
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mt-4 hidden bg-red-50 border-2 border-red-200 rounded-xl p-4 sm:p-6" id="previewBox">
      <p class="text-xs text-gray-500 mb-3 sm:mb-4 font-semibold">Előnézet:</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
        <div>
          <img
            id="productImage"
            class="w-full h-32 sm:h-40 object-cover rounded-lg"
            alt="Product preview"
          >
        </div>
        <div>
          <h3 class="text-base sm:text-lg font-bold text-gray-800 mb-2" id="productName"></h3>
          <p class="text-xs sm:text-sm text-gray-600 mb-3" id="productDesc"></p>
          <p class="text-green-600 font-bold mb-2 text-sm sm:text-base" id="productPrice"></p>
          <p class="text-xs sm:text-sm text-gray-600" id="productCategory"></p>
        </div>
      </div>
      <p class="text-red-600 font-semibold mt-3 sm:mt-4 text-xs sm:text-sm">
        ⚠️ Ez a művelet nem vonható vissza!
      </p>
    </div>

    <button
      id="deleteBtn"
      type="submit"
      disabled
      class="w-full bg-red-600 hover:bg-red-700 disabled:bg-gray-400
             text-white font-bold py-3 rounded-xl
             shadow-lg transition transform hover:scale-[1.02]
             active:scale-[0.98] text-sm sm:text-base"
    >
      🗑️ Termék törlése
    </button>

  </form>
</div>
<script>
  function updatePreview(select) {
    const previewBox = document.getElementById("previewBox");
    const deleteBtn = document.getElementById("deleteBtn");
    
    if (!select.value) {
      previewBox.classList.add("hidden");
      deleteBtn.disabled = true;
      return;
    }
    
    const selected = select.options[select.selectedIndex];
    document.getElementById("productName").textContent = selected.dataset.name;
    document.getElementById("productDesc").textContent = selected.dataset.description;
    document.getElementById("productPrice").textContent = "💰 " + parseFloat(selected.dataset.price).toFixed(2) + " HUF";
    document.getElementById("productCategory").textContent = "📦 Category: " + selected.dataset.category;
    document.getElementById("productImage").src = "../static/uploads/" + selected.dataset.image;
    
    previewBox.classList.remove("hidden");
    deleteBtn.disabled = false;
  }
</script>

</body>
</html>
