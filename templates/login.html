<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>PC DADDY – Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-900">
<header class="bg-black text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 h-20">

    <div class="flex items-center gap-4">
      <a href="/"><img src="../static/images/logó.png" alt="PC DADDY logó" class="h-16 w-auto"></a>
      <div class="leading-tight">
        <h1 class="text-2xl font-extrabold text-green-500 tracking-wide">PC DADDY</h1>
        <p class="text-xs text-gray-400">Prémium PC webshop</p>
      </div>
    </div>

    <div class="flex-1 mx-6">
      <form action="/products" method="GET" class="w-full">
        <input 
          type="text"
          name="search"
          placeholder="Keresés alkatrészek, konfigurációk között..."
          class="w-full px-4 py-2 rounded-md text-black focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </form>
    </div>

    <div class="flex items-center">
      <a href="/cart"><button class="text-3xl hover:text-green-500 transition relative" aria-label="Kosár">
        🛒
        <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{{ items_amount or 0 }}</span>
      </button></a>
    </div>

  </div>
</header>

<div class="max-w-md mx-auto mt-16 mb-20 bg-white rounded-3xl shadow-2xl p-10 animate-fadeIn">
  <h2 class="text-2xl font-bold text-center mb-6">Admin Bejelentkezés</h2>
  
  {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>
  {% endif %}
  
  <form method="POST" class="space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700">Felhasználónév</label>
      <input type="text" id="username" name="username" required 
             class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
    </div>
    
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Jelszó</label>
      <input type="password" id="password" name="password" required 
             class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
    </div>
    
    <button type="submit" class="w-full bg-black text-white py-2 px-4 rounded-md hover:bg-green-500 transition duration-200">
      Bejelentkezés
    </button>
  </form>
  
  <div class="mt-6 text-center">
    <a href="/" class="text-green-600 hover:text-green-800">Vissza a főoldalra</a>
  </div>
</div>

<footer class="bg-black text-white py-8 mt-20">
  <div class="max-w-7xl mx-auto px-6 text-center">
    <p>&copy; 2026 PC DADDY. Minden jog fenntartva.</p>
  </div>
</footer>

</body>
</html>
